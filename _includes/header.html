<div class="header">
    <div class="header_links">
        <div class="links">
            {% for link in site.data.links %}
                <a class="header_link" href="{{ link.url }}" target="_blank">{{ link.text }}</a>
            {% endfor %}

            <!-- Three-state theme toggle: light → dark → system -->
            <button id="theme_toggle" class="theme_toggle" aria-label="Toggle theme">
                <span class="theme_icon" id="theme_icon">🔆</span>
            </button>
        </div>
    </div>

    <span class="intro">
        <div class="intro_hello">
            <img class="intro_hello_pic" src="images/me.jpg" />
            <h1 class="intro_hello_text">Hello there!</h1>
        </div>

        <h2 class="intro_paragraph">
            I'm <span class="name">David Zhao</span>, a
            <span class="title_carousel">
                <span class="title_carousel_track">
                    <span class="title">compiler engineer</span>
                    <span class="title">programming languages researcher</span>
                    <span class="title">databases enthusiast</span>
                    <span class="title">tennis player</span>
                    <!-- Duplicate for seamless loop -->
                    <span class="title">compiler engineer</span>
                    <span class="title">programming languages researcher</span>
                    <span class="title">databases enthusiast</span>
                    <span class="title">tennis player</span>
                </span>
            </span>
        </h2>
    </span>
</div>
