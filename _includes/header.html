<div class="header">
    <div class="header_links">
        <div class="links">
            {% for link in site.data.links %}
                <a class="header_link" href="{{ link.url }}" target="_blank">{{ link.text }}</a>
            {% endfor %}

            <!-- Three-state theme toggle: light → dark → system -->
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                <span class="theme-icon" id="theme-icon">☀️</span>
            </button>
        </div>
    </div>

    <span class="intro">
        <div class="intro_hello">
            <img class="intro_hello_pic" src="images/me.jpg" />
            <h1 class="intro_hello_text">Hello there!</h1>
        </div>

        <h2 class="intro_paragraph">
            I'm <span class="name">David Zhao</span>, a compiler engineer, programming
            languages researcher, and databases enthusiast
        </h2>
    </span>
</div>
